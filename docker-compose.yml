services:
  postgres:
    image: postgres:17-alpine
    container_name: luxe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: luxe_user
      POSTGRES_PASSWORD: luxe_password
      POSTGRES_DB: luxe_commerce
    ports:
      - "5432:5432"
    volumes:
      - luxe_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: luxe_redis
    restart: unless-stopped
    command: redis-server --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - luxe_redis_data:/data

volumes:
  luxe_postgres_data:
  luxe_redis_data:
